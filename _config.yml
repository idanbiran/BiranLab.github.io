# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: BiranLab
first_name: Idan
last_name: Biran
contact_note: >
  Feel free to reach out via email for collaboration or inquiries.
description: > 
  Biran Lab - Official Research Group Website.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: jekyll, academic-website, biran-lab
lang: en
icon: ⚛️ 

url: https://idanbiran.github.io
baseurl: "/biranlab.github.io"
last_updated: false 
back_to_top: true 

# -----------------------------------------------------------------------------
# Navigation Bar (Manual Control)
# -----------------------------------------------------------------------------

navbar:
  - title: about
    permalink: /
  - title: projects
    permalink: /projects/
  - title: publications
    permalink: /publications/
  - title: people
    permalink: /people/

# -----------------------------------------------------------------------------
# Theme & Layout
# -----------------------------------------------------------------------------

repo_theme_light: default 
repo_theme_dark: dark 
repo_trophies:
  enabled: true
  theme_light: flat 
  theme_dark: gitdimmed 

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

navbar_fixed: true
footer_fixed: true
search_enabled: true
socials_in_search: true
posts_in_search: true
bib_search: true
max_width: 930px

# -----------------------------------------------------------------------------
# Collections (Ensures your pages actually work)
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
include: ["_pages", "_scripts"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor

# -----------------------------------------------------------------------------
# Jekyll Scholar (Updated to your name)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Biran]
  first_name: [Idan]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# Plug-ins & Libraries (Keep these as they are)
# -----------------------------------------------------------------------------

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jemoji

# ... (The rest of your library versions stay the same)
