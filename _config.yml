# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: BiranLab
first_name: Idan
last_name: Biran
contact_note: >
  You can reach us via email or visit our lab at the university.
description: > 
  Official website of the Biran Lab. Researching [Your Field Here].
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: academic-website, research-lab, biran-lab
lang: en
icon: ⚛️ 

# Keep these exactly as they are to maintain your styling
url: https://idanbiran.github.io
baseurl: "/biranlab.github.io"
last_updated: true 
back_to_top: true 

# -----------------------------------------------------------------------------
# Navigation Bar (The Tabs)
# -----------------------------------------------------------------------------

navbar:
  - title: about
    permalink: /
  - title: team
    permalink: /team/
  - title: projects
    permalink: /projects/
  - title: publications
    permalink: /publications/
#  - title: blog
#    permalink: /blog/
#  - title: cv
#    permalink: /cv/
#  - title: teaching
#    permalink: /teaching/
  - title: contact
    permalink: /contact/

# -----------------------------------------------------------------------------
# Layout & Theme Settings
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
max_width: 930px
enable_darkmode: true
enable_masonry: true
enable_math: true
enable_progressbar: true

# -----------------------------------------------------------------------------
# Collections (Ensures your projects and news show up)
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
  projects:
    output: true
  teachings:
    output: true

# -----------------------------------------------------------------------------
# Jekyll Settings & Plugins
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
include: ["_pages", "_scripts"]
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - _pages/about_einstein.md

plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar (For your publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Biran]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# Image Processing
# -----------------------------------------------------------------------------

imagemagick:
  enabled: true
  widths: [480, 800, 1400]
  input_directories: ["assets/img/"]
  input_formats: [".jpg", ".jpeg", ".png"]
  output_formats:
    webp: "-auto-orient -quality 85"

# -----------------------------------------------------------------------------
# Footer Social Icons (Optional: Fill these in to see icons)
# -----------------------------------------------------------------------------

social:
  email: your-email@address.com
  google_scholar_id: 
  twitter_username: 
  github_username: idanbiran
  linkedin_username:
